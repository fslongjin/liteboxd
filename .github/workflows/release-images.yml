name: Release Images

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: server
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: liteboxd-server
          - name: gateway
            context: ./backend
            dockerfile: ./backend/Dockerfile.gateway
            image: liteboxd-gateway
          - name: sandbox-launcher
            context: ./backend
            dockerfile: ./backend/Dockerfile.launcher
            image: liteboxd-sandbox-launcher
          - name: web
            context: ./web
            dockerfile: ./web/Dockerfile
            image: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate trigger scope
        id: gate
        if: github.event_name == 'push'
        shell: bash
        run: |
          git fetch origin master --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag commit $GITHUB_SHA is not on master. Skip publishing."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable publish for manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: echo "publish=true" >> "$GITHUB_OUTPUT"
        id: gate_manual

      - name: Compute image tag
        id: vars
        if: steps.gate.outputs.publish == 'true' || steps.gate_manual.outputs.publish == 'true'
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            short_sha="$(git rev-parse --short=12 "$GITHUB_SHA")"
            echo "tag=${short_sha}" >> "$GITHUB_OUTPUT"
          fi
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner=${owner_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.gate.outputs.publish == 'true' || steps.gate_manual.outputs.publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.gate.outputs.publish == 'true' || steps.gate_manual.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        if: steps.gate.outputs.publish == 'true' || steps.gate_manual.outputs.publish == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.owner }}/${{ matrix.image }}:${{ steps.vars.outputs.tag }}
