cluster:
  name: "liteboxd-prod"
  k3sInstall:
    scriptURL: "https://rancher-mirror.rancher.cn/k3s/k3s-install.sh"
    mirror: "cn"
  registries:
    mirrors:
      "docker.io":
        endpoint:
          - "https://mirror.ccs.tencentyun.com"
  master:
    host: "10.10.10.11"
    nodeIP: "172.16.0.11"
    port: 22
    user: "root"
    password: "${MASTER_PASS}"
    sudo: false
    k3s:
      version: "v1.34.4+k3s1"
      tlsSAN:
        - "10.10.10.11"
      installArgs:
        - "--flannel-backend=none"
        - "--disable-network-policy"
  agents:
    - host: "10.10.10.12"
      nodeIP: "172.16.0.12"
      port: 22
      user: "root"
      password: "${AGENT1_PASS}"
      sudo: false
    - host: "10.10.10.13"
      nodeIP: "172.16.0.13"
      port: 22
      user: "root"
      password: "${AGENT2_PASS}"
      sudo: false

network:
  cni: "cilium"
  cilium:
    version: "1.18.6"
    cliVersion: "v0.19.1"
    cliDownloadBaseURL: "https://cnb.cool/DragonOS-Community/cilium-cli/-/releases/download"
    podCIDR: "10.42.0.0/16"
    kubeProxyReplacement: true
    enableEgressGateway: true

storage:
  longhorn:
    enabled: true
    namespace: "longhorn-system"
    releaseName: "longhorn"
    chartRepoURL: "https://charts.longhorn.io"
    defaultReplicaCount: 1
    setDefaultStorageClass: true
    helmInstallScriptURL: "https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3"

liteboxd:
  namespaceSystem: "liteboxd-system"
  namespaceSandbox: "liteboxd-sandbox"
  ingressHost: "longjin.dev.liteboxd.com.local"
  gatewayIngressHost: "gateway.longjin.dev.liteboxd.com.local"
  gatewayURL: "http://gateway.longjin.dev.liteboxd.com.local"
  metadataRetentionDays: 7
  security:
    sandboxTokenEncryptionKey: "${SANDBOX_TOKEN_KEY}"
    sandboxTokenEncryptionKeyID: "v1"
    adminUsername: "admin"
    adminInitialPassword: "${LITEBOXD_ADMIN_INITIAL_PASSWORD}"
  configDir: "./deploy-config/prod"
  images:
    api: "dragonos-registry.ringotek.cn/liteboxd/liteboxd-server:260316-1"
    gateway: "dragonos-registry.ringotek.cn/liteboxd/liteboxd-gateway:260316-1"
    launcher: "dragonos-registry.ringotek.cn/liteboxd/liteboxd-sandbox-launcher:260316-1"
    web: "dragonos-registry.ringotek.cn/liteboxd/web:260316-1"
  deploySandboxResources: true

runtime:
  parallelism: 5
  sshTimeoutSeconds: 15
  commandTimeoutSeconds: 1200
  removeAbsentAgents: false
  dryRun: false
