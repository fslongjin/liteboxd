apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: liteboxd-api-cluster
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # Sandbox persistent deletion needs cluster-scoped PV/VolumeAttachment operations.
  # These are used only for finalizer-based force cleanup and verifying stages.
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "delete", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: liteboxd-api-cluster
subjects:
  - kind: ServiceAccount
    name: liteboxd-api
    namespace: liteboxd-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: liteboxd-api-cluster
